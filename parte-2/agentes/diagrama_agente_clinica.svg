<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Definições -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#555" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#e74c3c" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9b59b6" />
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f39c12" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="1000" fill="#f9f9f9"/>
  
  <!-- Título -->
  <text x="700" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    Arquitetura do Agente de Atendimento de Clínica Médica
  </text>
  
  <!-- ========== CAMADA 1: USUÁRIO ========== -->
  <rect x="100" y="80" width="250" height="100" rx="15" fill="#3498db" fill-opacity="0.2" stroke="#3498db" stroke-width="3"/>
  <text x="225" y="120" font-size="24" font-weight="bold" text-anchor="middle" fill="#3498db">👤 Usuário</text>
  <text x="225" y="150" font-size="14" text-anchor="middle" fill="#34495e">Interage via linguagem natural</text>
  
  <!-- ========== CAMADA 2: AGENTE ========== -->
  <rect x="450" y="240" width="500" height="150" rx="15" fill="#2ecc71" fill-opacity="0.2" stroke="#2ecc71" stroke-width="3"/>
  <text x="700" y="275" font-size="22" font-weight="bold" text-anchor="middle" fill="#2ecc71">🤖 Agente Clínica</text>
  <text x="700" y="305" font-size="14" text-anchor="middle" fill="#27ae60" font-style="italic">Gerencia Estado da Conversação</text>
  <text x="700" y="330" font-size="14" text-anchor="middle" fill="#27ae60" font-style="italic">Mantém Histórico (10 últimas mensagens)</text>
  <text x="700" y="355" font-size="14" text-anchor="middle" fill="#27ae60" font-style="italic">Identifica Paciente (Nome + CPF)</text>
  
  <!-- ========== CAMADA 3: COMPONENTES ========== -->
  
  <!-- LLM (OpenAI) -->
  <rect x="100" y="450" width="280" height="180" rx="15" fill="#e74c3c" fill-opacity="0.2" stroke="#e74c3c" stroke-width="3"/>
  <text x="240" y="485" font-size="20" font-weight="bold" text-anchor="middle" fill="#e74c3c">🧠 OpenAI API</text>
  <text x="240" y="515" font-size="14" text-anchor="middle" fill="#c0392b">Modelo: GPT-4o-mini</text>
  <text x="240" y="540" font-size="14" text-anchor="middle" fill="#c0392b">Max Tokens: 500</text>
  <text x="240" y="565" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">Funções:</text>
  <text x="240" y="595" font-size="12" text-anchor="middle" fill="#c0392b">• Extração de Dados</text>
  
  <!-- Contexto -->
  <rect x="450" y="450" width="280" height="180" rx="15" fill="#9b59b6" fill-opacity="0.2" stroke="#9b59b6" stroke-width="3"/>
  <text x="590" y="485" font-size="20" font-weight="bold" text-anchor="middle" fill="#9b59b6">📋 Contexto Dinâmico</text>
  <text x="590" y="515" font-size="14" text-anchor="middle" fill="#8e44ad">System Prompt</text>
  <text x="590" y="540" font-size="14" text-anchor="middle" fill="#8e44ad">Dados do Paciente</text>
  <text x="590" y="565" font-size="14" text-anchor="middle" fill="#8e44ad">Lista de Exames</text>
  <text x="590" y="590" font-size="14" text-anchor="middle" fill="#8e44ad">Médico Responsável</text>
  <text x="590" y="615" font-size="14" text-anchor="middle" fill="#8e44ad">Agendas Disponíveis</text>
  
  <!-- Banco de Dados -->
  <rect x="800" y="450" width="280" height="180" rx="15" fill="#f39c12" fill-opacity="0.2" stroke="#f39c12" stroke-width="3"/>
  <text x="940" y="485" font-size="20" font-weight="bold" text-anchor="middle" fill="#f39c12">💾 Banco de Dados</text>
  <text x="940" y="515" font-size="14" text-anchor="middle" fill="#d68910">Arquivos JSON:</text>
  <text x="940" y="545" font-size="14" text-anchor="middle" fill="#d68910">• pacientes.json</text>
  <text x="940" y="570" font-size="14" text-anchor="middle" fill="#d68910">• medicos.json</text>
  <text x="940" y="595" font-size="14" text-anchor="middle" fill="#d68910">• exames.json</text>
  
  <!-- ========== FLUXO DE CONVERSAÇÃO ========== -->
  <rect x="50" y="680" width="1300" height="120" rx="10" fill="white" stroke="#34495e" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="700" y="710" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">🔄 Fluxo de Conversação</text>
  
  <!-- Passos do fluxo -->
  <circle cx="120" cy="755" r="25" fill="#34495e"/>
  <text x="120" y="763" font-size="18" font-weight="bold" text-anchor="middle" fill="white">1</text>
  <text x="120" y="785" font-size="12" text-anchor="middle" fill="#34495e">Mensagem</text>
  
  <line x1="145" y1="755" x2="210" y2="755" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <circle cx="235" cy="755" r="25" fill="#34495e"/>
  <text x="235" y="763" font-size="18" font-weight="bold" text-anchor="middle" fill="white">2</text>
  <text x="235" y="785" font-size="12" text-anchor="middle" fill="#34495e">Identificação</text>
  
  <line x1="260" y1="755" x2="360" y2="755" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <circle cx="385" cy="755" r="25" fill="#34495e"/>
  <text x="385" y="763" font-size="18" font-weight="bold" text-anchor="middle" fill="white">3</text>
  <text x="385" y="785" font-size="12" text-anchor="middle" fill="#34495e">Histórico</text>
  
  <line x1="410" y1="755" x2="510" y2="755" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <circle cx="535" cy="755" r="25" fill="#34495e"/>
  <text x="535" y="763" font-size="18" font-weight="bold" text-anchor="middle" fill="white">4</text>
  <text x="535" y="785" font-size="12" text-anchor="middle" fill="#34495e">Contexto</text>
  
  <line x1="560" y1="755" x2="710" y2="755" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <circle cx="735" cy="755" r="25" fill="#34495e"/>
  <text x="735" y="763" font-size="18" font-weight="bold" text-anchor="middle" fill="white">5</text>
  <text x="735" y="785" font-size="12" text-anchor="middle" fill="#34495e">LLM</text>
  
  <line x1="760" y1="755" x2="910" y2="755" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <circle cx="935" cy="755" r="25" fill="#34495e"/>
  <text x="935" y="763" font-size="18" font-weight="bold" text-anchor="middle" fill="white">6</text>
  <text x="935" y="785" font-size="12" text-anchor="middle" fill="#34495e">Resposta</text>
  
  <line x1="960" y1="755" x2="1110" y2="755" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <circle cx="1135" cy="755" r="25" fill="#34495e"/>
  <text x="1135" y="763" font-size="18" font-weight="bold" text-anchor="middle" fill="white">7</text>
  <text x="1135" y="785" font-size="12" text-anchor="middle" fill="#34495e">Exibição</text>
  
  <!-- ========== SETAS DE CONEXÃO ========== -->
  
  <!-- User -> Agent -->
  <line x1="225" y1="180" x2="700" y2="240" stroke="#3498db" stroke-width="3" marker-end="url(#arrowhead-blue)"/>
  
  <!-- Agent -> LLM (bidirectional) -->
  <line x1="450" y1="315" x2="380" y2="490" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <line x1="360" y1="510" x2="450" y2="340" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  
  <!-- Agent -> Context -->
  <line x1="590" y1="390" x2="590" y2="450" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead-purple)"/>
  
  <!-- Agent -> DB (bidirectional) -->
  <line x1="950" y1="315" x2="1000" y2="450" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
  <line x1="1020" y1="470" x2="950" y2="340" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
  
  <!-- Context -> LLM -->
  <line x1="450" y1="540" x2="380" y2="540" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-purple)"/>
  
  <!-- DB -> Context -->
  <line x1="800" y1="540" x2="730" y2="540" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-orange)"/>
  
  <!-- ========== ANOTAÇÕES ========== -->
  
  <!-- Anotação Estado -->
  <rect x="1020" y="260" width="180" height="60" rx="8" fill="#add8e6" stroke="#87ceeb" stroke-width="2"/>
  <text x="1110" y="283" font-size="14" font-weight="bold" text-anchor="middle" fill="#00568c">Mantém Estado</text>
  <text x="1110" y="303" font-size="12" text-anchor="middle" fill="#00568c">Paciente atual + Histórico</text>
  <line x1="950" y1="290" x2="1020" y2="290" stroke="#888" stroke-width="1" marker-end="url(#arrowhead)"/>
  
  <!-- ========== CARACTERÍSTICAS ========== -->
  <rect x="150" y="840" width="1100" height="120" rx="10" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
  <text x="700" y="870" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">✨ Características Principais</text>
  
  <text x="200" y="895" font-size="13" text-anchor="start" fill="#34495e">• Conversação Natural com GPT-4o-mini</text>
  <text x="200" y="915" font-size="13" text-anchor="start" fill="#34495e">• Contexto Dinâmico Rico (paciente + médicos + agendas)</text>
  <text x="200" y="935" font-size="13" text-anchor="start" fill="#34495e">• Extração Inteligente de Dados (nome + CPF via IA)</text>
  
  <text x="720" y="895" font-size="13" text-anchor="start" fill="#34495e">• Histórico de 10 mensagens mantido</text>
  <text x="720" y="915" font-size="13" text-anchor="start" fill="#34495e">• Integração com Banco de Dados JSON</text>
  
  <!-- ========== RODAPÉ ========== -->
  <text x="700" y="985" font-size="13" font-style="italic" text-anchor="middle" fill="#7f8c8d">
    Agente de Atendimento de Clínica Médica - Princípios de Construção de Agentes de IA
  </text>
</svg>

